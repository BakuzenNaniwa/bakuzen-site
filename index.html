<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakuzen Naniwa Photography</title>

<style>
body{margin:0;font-family:Helvetica,Arial,sans-serif;color:white;}
header{
 position:fixed;top:0;width:100%;
 padding:20px 40px;
 display:flex;justify-content:space-between;
 z-index:10;
}
nav a{margin-left:20px;color:white;text-decoration:none;}

.hero{
 height:100vh;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 position:relative;
 overflow:hidden;
}
.slide{
 position:absolute;
 width:100%;height:100%;
 background-size:cover;
 background-position:center;
 opacity:0;
 transition:1.5s;
}
.slide.active{opacity:1;}

.hero-text{position:relative;z-index:5;}

section{padding:100px 60px;color:black;background:white;}

.gallery{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:20px;
}
.gallery img{width:100%;cursor:pointer;}

 /* ▼スマホ用設定 */
 @media (max-width: 768px) {

h1{
  font-size:28px;
}

h2{
  font-size:22px;
}

p{
  font-size:16px;
  line-height:1.6;
}
  body{
  padding:20px;
}

.gallery{
  grid-template-columns:1fr;
  gap:15px;
}

.works-grid{
  grid-template-columns:1fr;
  gap:30px;
}

  
}
</style>
</head>

<body>

<header>
<div>Bakuzen Naniwa Photography</div>
<nav>
<a href="#portfolio">PORTFOLIO</a>
</nav>
</header>

<section class="hero">
<div class="slide active" style="background-image:url('images/top1.jpg')"></div>
<div class="slide" style="background-image:url('images/top2.jpg')"></div>
<div class="slide" style="background-image:url('images/top3.jpg')"></div>

<div class="hero-text">
<h1>Tokyo based Photographer</h1>
<p>Fashion / Portrait / Documentary</p>
</div>
</section>

<section id="portfolio">

<h2>Fashion</h2>
<div class="gallery">
<a href="works/fashion/fashion01.html"><img src="images/fashion_thumb1.jpg"></a>
<a href="works/fashion/fashion02.html"><img src="images/fashion_thumb2.jpg"></a>
<a href="works/fashion/fashion03.html"><img src="images/fashion_thumb3.jpg"></a>
</div>

<h2>Portrait</h2>
<div class="gallery">
<a href="works/portrait/portrait01.html"><img src="images/portrait_thumb1.jpg"></a>
<a href="works/portrait/portrait02.html"><img src="images/portrait_thumb2.jpg"></a>
<a href="works/portrait/portrait03.html"><img src="images/portrait_thumb3.jpg"></a>
</div>

<h2>Product</h2>
<div class="gallery">
<a href="works/product/product01.html"><img src="images/product_thumb1.jpg"></a>
<a href="works/product/product02.html"><img src="images/product_thumb2.jpg"></a>
<a href="works/product/product03.html"><img src="images/product_thumb3.jpg"></a>
</div>

<h2>Documentary</h2>
<div class="gallery">
<a href="works/documentary/doc01.html"><img src="images/doc_thumb1.jpg"></a>
<a href="works/documentary/doc02.html"><img src="images/doc_thumb2.jpg"></a>
<a href="works/documentary/doc03.html"><img src="images/doc_thumb3.jpg"></a>
</div>

<h2>Daily Snap</h2>
<div class="gallery">
<a href="works/snap/snap01.html"><img src="images/snap_thumb1.jpg"></a>
<a href="works/snap/snap02.html"><img src="images/snap_thumb2.jpg"></a>
<a href="works/snap/snap03.html"><img src="images/snap_thumb3.jpg"></a>
</div>

</section>

<script>
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
 slides[i].classList.remove("active");
 i=(i+1)%slides.length;
 slides[i].classList.add("active");
},3000);
</script>

</body>
</html>
